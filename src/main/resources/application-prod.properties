# ============================================
# Aiven Production Database Configuration
# ============================================

# -- Connection Details --
spring.datasource.url=jdbc:mysql://mysql-1093b683-vit-607d.g.aivencloud.com:16624/defaultdb?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin
spring.datasource.password=REPLACE_WITH_YOUR_AIVEN_PASSWORD

# -- JPA/Hibernate Settings for Production --
# 'validate' is safer for production. It checks if the schema matches the entities and fails on mismatch.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -- Connection Pool Settings for Production --
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
